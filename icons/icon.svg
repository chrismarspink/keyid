<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e3a8a"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="band" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>
  <!-- Left accent band -->
  <rect x="0" y="0" width="96" height="512" rx="108" fill="url(#band)"/>
  <rect x="48" y="0" width="48" height="512" fill="url(#band)"/>
  <!-- K letter -->
  <text x="300" y="370" font-family="system-ui,-apple-system,sans-serif" font-weight="900"
    font-size="280" fill="#f8fafc" text-anchor="middle" letter-spacing="-8">K</text>
  <!-- Small shield/lock icon inside the band -->
  <rect x="32" y="220" width="32" height="26" rx="4" fill="rgba(255,255,255,0.3)"/>
  <rect x="36" y="212" width="24" height="16" rx="8" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="4"/>
  <!-- ID card lines hint -->
  <rect x="140" y="300" width="160" height="6" rx="3" fill="rgba(255,255,255,0.12)"/>
  <rect x="140" y="318" width="110" height="6" rx="3" fill="rgba(255,255,255,0.08)"/>
</svg>
